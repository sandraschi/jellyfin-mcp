name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { python-version: "3.12" }
      - run: uv sync
      - run: uv run ruff check src/

  test:
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { python-version: "3.12" }
      - run: uv sync
      - run: uv run pytest tests/unit tests/integration -m "not slow" --cov=src/jellyfin_mcp --cov-report=xml -v
        env:
          JELLYFIN_URL: http://localhost:8096
          JELLYFIN_API_KEY: ${{ secrets.JELLYFIN_API_KEY }}

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd webapp/frontend && npm ci
      - run: cd webapp/frontend && npx @biomejs/biome check .

  e2e:
    runs-on: ubuntu-latest
    needs: [test, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: uv sync
      - run: cd webapp/frontend && npm ci
      - run: cd webapp/frontend && npx playwright install chromium
      - run: cd webapp/frontend && npx playwright test
        env:
          CI: "true"
